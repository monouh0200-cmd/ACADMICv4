<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أكاديمية التعلم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
      /* Loading screen — visible before React mounts */
      body { margin:0; background:#f7f8fc; font-family:Cairo,sans-serif; }
      #pre-load {
        position:fixed; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:16px;
        background:#f7f8fc; z-index:9999; transition:opacity .3s;
      }
      #pre-load .spinner {
        width:40px; height:40px; border:4px solid #e2e8f0;
        border-top-color:#16a34a; border-radius:50%;
        animation:spin .8s linear infinite;
      }
      #pre-load p { color:#64748b; font-size:14px; font-weight:700; margin:0; }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Pre-React loading indicator -->
    <div id="pre-load">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>

    <div id="root"></div>

    <script type="module" src="./src/main.tsx"></script>

    <script>
      // Hide loading screen once React mounts
      window.__hidePreLoad = function() {
        var el = document.getElementById('pre-load');
        if (el) { el.style.opacity='0'; setTimeout(function(){ el.remove(); }, 300); }
      };

      // Fallback: if JS fails to load in 10s, show error
      setTimeout(function() {
        var el = document.getElementById('pre-load');
        if (el && document.getElementById('root').children.length === 0) {
          el.innerHTML = '<div style="text-align:center;padding:20px">' +
            '<p style="color:#dc2626;font-weight:700;font-size:16px">فشل تحميل التطبيق</p>' +
            '<p style="color:#64748b;font-size:13px">تأكد من اتصالك بالإنترنت ثم حدّث الصفحة</p>' +
            '<button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#16a34a;color:white;border:none;border-radius:8px;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700">تحديث</button>' +
            '</div>';
        }
      }, 10000);
    </script>
  </body>
</html>
